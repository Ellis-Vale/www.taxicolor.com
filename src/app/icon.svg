<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium Gold/Saffron Gradient for high-end contrast -->
    <linearGradient id="saffronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF066" />
      <stop offset="50%" stop-color="#FFC700" />
      <stop offset="100%" stop-color="#D99B00" />
    </linearGradient>
    <linearGradient id="hornGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F" />
      <stop offset="100%" stop-color="#FF9800" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Outermost glowing circle or hexagon border (subtle) -->
  <polygon points="50,3 90,26 90,74 50,97 10,74 10,26" fill="none" stroke="url(#saffronGrad)" stroke-width="1.5" stroke-opacity="0.3" />
  
  <!-- Faceted Low-Poly Takin (Budorcas taxicolor) Head Design -->
  <g id="takin-head">
    <!-- Left Horn (faceted) -->
    <polygon points="50,42 30,22 12,28 28,42" fill="url(#hornGrad)" />
    <polygon points="30,22 12,28 32,32" fill="#E65100" opacity="0.4" />

    <!-- Right Horn (faceted) -->
    <polygon points="50,42 70,22 88,28 72,42" fill="url(#hornGrad)" />
    <polygon points="70,22 88,28 68,32" fill="#E65100" opacity="0.6" />

    <!-- Center Forehead Bridge -->
    <polygon points="50,42 50,75 35,53" fill="url(#saffronGrad)" />
    <polygon points="50,42 50,75 65,53" fill="#D99B00" />

    <!-- Outer Cheeks / Muzzle facets -->
    <polygon points="35,53 50,75 38,78 24,58" fill="#F5B041" />
    <polygon points="65,53 50,75 62,78 76,58" fill="#B77900" />

    <!-- Forehead Plate Left -->
    <polygon points="50,42 35,53 24,58 30,22" fill="#FFE082" />
    <!-- Forehead Plate Right -->
    <polygon points="50,42 65,53 76,58 70,22" fill="#F5B041" opacity="0.85" />
    
    <!-- Muzzle / Nose (pointing down, strong base) -->
    <polygon points="50,75 38,78 50,88" fill="#FFC700" />
    <polygon points="50,75 62,78 50,88" fill="#B77900" />
    
    <!-- Dynamic high-altitude mountain peak below the head representing 3000m environment -->
    <polygon points="50,68 62,78 50,88 38,78" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.2" />
  </g>
</svg>
